services:
  - type: web
    name: dropai-api
    rootDir: backend
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: bash startup.sh
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dropai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: '["https://dropai-demo.vercel.app","http://localhost:3000","http://localhost:5173"]'

databases:
  - name: dropai-db
    plan: free
    databaseName: dropai_db
    user: dropai
